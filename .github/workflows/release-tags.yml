name: Release tagged build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout mod repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build
        run: |
          git config core.filemode false
          chmod +x ./gradlew
          ./gradlew --build-cache --info --stacktrace clean build

      - name: Collect release jar
        run: |
          mkdir -p release
          shopt -s nullglob
          for jar in build/libs/*.jar; do
            case "$(basename "$jar")" in
              *-dev.jar|*-sources.jar)
                ;;
              *)
                cp "$jar" release/
                ;;
            esac
          done

          count="$(find release -maxdepth 1 -type f -name '*.jar' | wc -l)"
          if [ "$count" -eq 0 ]; then
            echo "No release jar found in build/libs"
            ls -la build/libs
            exit 1
          fi

          echo "Release files:"
          ls -la release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonFix-${{ env.RELEASE_TAG }}
          path: release/*.jar
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" > /dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release/*.jar --clobber
          else
            gh release create "$RELEASE_TAG" release/*.jar --title "$RELEASE_TAG" --generate-notes
          fi
